services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_TRANSPORT: ${VITE_TRANSPORT:-colyseus}
        VITE_COLYSEUS_URL: ${VITE_COLYSEUS_URL:-wss://colyseus.hendrix.com.ng}
    container_name: boredroom-web
    restart: unless-stopped
    ports:
      - "8088:80"
    depends_on:
      - server

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: boredroom-server
    restart: unless-stopped
    ports:
      - "2567:2567"
    environment:
      NODE_ENV: production
      PORT: "2567"
      # Server-only session persistence. Skips gracefully if unset.
      # Reaches Supabase Kong directly over the shared docker network (container-to-container,
      # no host-gateway hairpin).
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      GAME_ADMIN_TOKEN: ${GAME_ADMIN_TOKEN:-}
      GAME_ADMIN_ORIGINS: ${GAME_ADMIN_ORIGINS:-https://party.hendrix.com.ng}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-google/gemini-2.5-flash-lite}
      AI_APP_URL: ${AI_APP_URL:-https://party.hendrix.com.ng}
      AI_APP_NAME: ${AI_APP_NAME:-BoredRoom}
      TTS_BASE_URL: ${TTS_BASE_URL:-https://yarngpt.ai/api/v1}
      TTS_API_KEY: ${TTS_API_KEY:-}
      TTS_VOICE: ${TTS_VOICE:-Idera}
      BOREDROOM_GAMES_DIR: /var/lib/boredroom/games
      BOREDROOM_GAMES_CATALOG_URL: ${BOREDROOM_GAMES_CATALOG_URL:-https://raw.githubusercontent.com/thathman/BoredRoom-Games/main/catalog.json}
      BOREDROOM_GAMES_PUBLIC_KEY: ${BOREDROOM_GAMES_PUBLIC_KEY:-}
    volumes:
      - boredroom-games:/var/lib/boredroom/games
    networks:
      - default
      - supabase

networks:
  supabase:
    external: true
    name: supabase_default

volumes:
  boredroom-games:
