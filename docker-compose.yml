services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_TRANSPORT: ${VITE_TRANSPORT:-colyseus}
        VITE_COLYSEUS_URL: ${VITE_COLYSEUS_URL:-wss://colyseus.hendrix.com.ng}
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY:-}
        VITE_SUPABASE_PROJECT_ID: ${VITE_SUPABASE_PROJECT_ID:-}
    container_name: boredroom-web
    restart: unless-stopped
    ports:
      - "8088:80"
    depends_on:
      - server

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: boredroom-server
    restart: unless-stopped
    ports:
      - "2567:2567"
    environment:
      NODE_ENV: production
      PORT: "2567"
      # Server-side session persistence (Phase 1 spine). Skips gracefully if unset.
      # Reaches Supabase Kong directly over the shared docker network (container-to-container,
      # no host-gateway hairpin). The browser uses the public VITE_SUPABASE_URL instead.
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      PACK_ADMIN_TOKEN: ${PACK_ADMIN_TOKEN:-}
    networks:
      - default
      - supabase

networks:
  supabase:
    external: true
    name: supabase_default
